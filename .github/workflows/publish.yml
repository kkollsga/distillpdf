name: Publish to PyPI

# Publish distillpdf to PyPI when the version in Cargo.toml is newer than the version
# already on PyPI. On every push to main (and manual dispatch): read the version, run CI
# (build + tests), and ONLY if the version is unpublished AND the tests pass, build the
# wheels + sdist and upload them. An unchanged version is skipped, so the workflow is
# idempotent — bump the version in Cargo.toml + pyproject.toml to cut a release.
#
# Auth: uses the PYPI_API_TOKEN repository secret (a PyPI API token; username is the
# implicit __token__). To use PyPI Trusted Publishing instead, delete the `password:`
# line in the publish job, add `permissions: { id-token: write }` and `environment: pypi`
# to that job, and register this repo + workflow as a trusted publisher on PyPI.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  check:
    name: Check version vs PyPI
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.v.outputs.should_publish }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          PYPROJECT=$(grep -m 1 '^version' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version:    $VERSION"
          echo "pyproject.toml version: $PYPROJECT"
          # The wheel is built from pyproject.toml's version; keep it in lockstep with
          # Cargo.toml (the source of truth we check) so we never publish a mismatch.
          if [ "$VERSION" != "$PYPROJECT" ]; then
            echo "::error::Cargo.toml ($VERSION) and pyproject.toml ($PYPROJECT) versions differ — keep them in sync."
            exit 1
          fi
          # PyPI's JSON API returns 200 if this exact version is already published, 404
          # if not. Only a definitive 404 triggers a publish; anything else (200, a 403
          # rate-limit, 5xx) is treated as "already published or can't tell — skip", so
          # we never attempt to re-upload an existing version.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/distillpdf/$VERSION/json")
          if [ "$STATUS" = "404" ]; then
            echo "distillpdf $VERSION is not on PyPI (HTTP 404) — will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "distillpdf $VERSION already on PyPI or unverifiable (HTTP $STATUS) — skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: CI gate (build + tests)
    needs: [check]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build & install distillpdf
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --out dist
          pip install dist/*.whl
      - name: Run tests
        run: pytest tests/ -q

  wheels:
    name: Build wheel - ${{ matrix.os }} - ${{ matrix.target }}
    needs: [check, test]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    # Same wheel set as kglite: one abi3 wheel per OS (the abi3-py38 cdylib serves every
    # Python >= 3.8, so there is no per-Python-version matrix).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Force cargo PATH precedence (macOS rustup-init shim workaround)
        # macos images ship a rustup-init shim at /usr/local/bin/cargo that shadows the
        # toolchain dtolnay/rust-toolchain installs; prepend ~/.cargo/bin so maturin's
        # `cargo metadata` resolves the real toolchain.
        if: matrix.os == 'macos-latest'
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "wheel-${{ matrix.target }}"
      - name: Install maturin
        run: pip install maturin
      - name: Build abi3 wheel
        run: maturin build --release --target ${{ matrix.target }} --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [check, wheels]
    if: needs.check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -l dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
