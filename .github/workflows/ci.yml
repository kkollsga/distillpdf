name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # third_party/{leptonica,tesseract} for the bundled fast OCR engine

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Rust unit tests
        # `extension-module` is opt-in (see Cargo.toml [features]); WITHOUT it the test
        # binary links libpython normally, so cargo test runs the pure-logic unit tests.
        run: cargo test --lib

      - name: Build & install distillpdf (with the bundled Tesseract fast OCR engine)
        # `--features extension-module,tesseract` builds minimal static Leptonica + Tesseract from the vendored
        # submodules (CMake is preinstalled on the runner), exercising the same path the wheels
        # use and enabling the bundled-engine tests.
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --features extension-module,tesseract --out dist
          pip install dist/*.whl

      - name: Run tests
        # tests/ is fully self-contained: every fixture is generated by us and committed
        # (no third-party corpus), so the whole suite runs for real on a fresh clone.
        #
        # The deeper corpus regression gate (37 metrics over 25+ real-world PDFs) is NOT
        # run here ON PURPOSE: the corpus is license-encumbered third-party material and
        # cannot be published, so the whole benchmarking/ tree is gitignored and exists
        # only on a maintainer's machine. Faking a CI job that silently skips when the
        # corpus is absent would read as "covered" when it isn't. Instead the gate is a
        # required LOCAL pre-release step — run scripts/release-check.sh (it runs these
        # same checks plus the corpus gate). Treat a green release-check, not this badge,
        # as the release gate.
        run: pytest tests/ -q
