name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Rust unit tests
        # `extension-module` is opt-in (see Cargo.toml [features]); WITHOUT it the test
        # binary links libpython normally, so cargo test runs the pure-logic unit tests.
        run: cargo test --lib

      - name: Build & install distillpdf
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --out dist
          pip install dist/*.whl

      - name: Run tests
        # tests/ is fully self-contained: every fixture is generated by us and committed
        # (no third-party corpus), so the whole suite runs for real on a fresh clone. The
        # deeper corpus gates are local-only under the gitignored benchmarking/.
        run: pytest tests/ -q
